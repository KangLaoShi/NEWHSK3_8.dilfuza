        function Quiz({ data, promptText }) {

            const [showResult, setShowResult] = React.useState(false);
            const [selectedIdx, setSelectedIdx] = React.useState(null);

                if (selectedIdx !== null) return;
                setSelectedIdx(idx);
                if (option === data[currentQ].a) setScore(s => s + 1);

                setTimeout(() => {
                    setSelectedIdx(null);
                    if (currentQ < data.length - 1) {
                        setCurrentQ(currentQ + 1);

                        setShowResult(true);

                        <p className="text-2xl mb-8">Siz {data.length} tadan {score} ta to'g'ri topdingiz!</p>

                );

                <div className="max-w-4xl mx-auto space-y-8">
                    {grammarData.map((g, idx) => (
                        <div key={idx} className="glass-panel p-6 md:p-8 rounded-2xl">
                            <h2 className="text-2xl font-bold text-white mb-2 flex items-center gap-3">
                                <span className="bg-indigo-600 w-8 h-8 rounded-full flex items-center justify-center text-sm">{idx + 1}</span>
                                {g.title.hanzi}
                            </h2>
                            <h3 className="text-xl text-indigo-300 mb-4 ml-11">{g.title.uz}</h3>
                            
                            <div className="bg-black/20 p-4 rounded-xl mb-6 ml-11">
                                <p className="text-lg text-white mb-2">{g.explanation.hanzi}</p>
                                <p className="text-blue-300 text-sm mb-1">{g.explanation.uz}</p>
                                <p className="text-gray-400 text-sm">{g.explanation.ru}</p>
                            </div>

                            <div className="ml-11 space-y-4">
                                <h4 className="font-semibold text-gray-300">Misollar (Examples):</h4>
                                {g.examples.map((ex, i) => (
                                    <div key={i} className="border-l-2 border-indigo-500 pl-4">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <p className="text-lg text-white">{ex.hanzi}</p>
                                                <p className="text-indigo-300">{ex.pinyin}</p>
                                                <p className="text-gray-300 text-sm mt-1">{ex.uz}</p>
                                            </div>
                                            <TextToSpeech text={ex.hanzi} className="text-gray-400" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function FillBlanks() {
            const [answers, setAnswers] = React.useState({});
            const [submitted, setSubmitted] = React.useState(false);

            const handleSelect = (qIdx, opt) => {
                if(submitted) return;
                setAnswers({...answers, [qIdx]: opt});
            };

            const score = Object.keys(answers).filter(k => answers[k] === fillBlanksData[k].blankWord).length;

            return (
                <div className="max-w-3xl mx-auto space-y-6">
                    {fillBlanksData.map((q, idx) => {
                        const parts = q.q.split(q.blankWord);
                        const isCorrect = answers[idx] === q.blankWord;
                        
                        return (
                            <div key={idx} className="glass-panel p-6 rounded-2xl">
                                <div className="text-lg mb-4 flex items-center flex-wrap gap-2">
                                    <span className="text-gray-400 w-6">{idx+1}.</span>
                                    <span>{parts[0]}</span>
                                    <span className={`inline-block border-b-2 min-w-[80px] text-center px-2 font-bold ${submitted ? (isCorrect ? 'text-green-400 border-green-400' : 'text-red-400 border-red-400') : 'text-indigo-300 border-indigo-400'}`}>
                                        {answers[idx] || "____"}
                                    </span>
                                    <span>{parts[1]}</span>
                                </div>
                                <div className="flex gap-2 ml-8 flex-wrap">
                                    {q.options.map((opt, i) => (
                                        <button key={i} 
                                            onClick={() => handleSelect(idx, opt)}
                                            className={`px-4 py-1 rounded-full text-sm transition-all ${answers[idx] === opt ? 'bg-indigo-600 text-white' : 'glass-panel hover:bg-white/20 text-gray-300'}`}>
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                                {submitted && !isCorrect && (
                                    <p className="text-sm text-green-400 mt-2 ml-8">To'g'ri javob: {q.blankWord}</p>
                                )}
                            </div>
                        );
                    })}
                    
                    <div className="text-center pt-6">
                        {!submitted ? (
                            <button onClick={() => setSubmitted(true)} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-full transition-all text-lg shadow-lg">
                                Tekshirish
                            </button>
                        ) : (
                            <div className="glass-panel p-6 rounded-2xl inline-block">
                                <h3 className="text-2xl font-bold mb-2">Natija: {score} / {fillBlanksData.length}</h3>
                                <button onClick={() => {setSubmitted(false); setAnswers({});}} className="text-indigo-300 hover:text-white underline">
                                    Qayta ishlash
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = React.useState('flashcards');

            const tabs = [
                { id: 'flashcards', label: "Lug'at fleshkartalari", icon: 'fa-clone' },
                { id: 'vocabQuiz', label: "Lug'at testi", icon: 'fa-spell-check' },
                { id: 'dialogues', label: "Muloqot", icon: 'fa-comments' },
                { id: 'grammar', label: "Grammatika", icon: 'fa-book-open' },
                { id: 'grammarQuiz', label: "Grammatika testi", icon: 'fa-tasks' },
                { id: 'fillBlanks', label: "So'zlarni to'ldirish", icon: 'fa-edit' }
            ];

            return (
                <div className="min-h-screen flex flex-col pt-10">
                    <header className="text-center mb-10 px-4">
                        <h1 className="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 mb-4 drop-shadow-sm">
                            这本书被别人借走了
                        </h1>
                        <h2 className="text-xl md:text-2xl text-gray-300 font-light tracking-wide">
                            Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                        </h2>
                    </header>

                    <main className="flex-grow w-full max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mb-20">
                        {/* Tab Navigation */}
                        <div className="flex flex-wrap justify-center gap-2 mb-10">
                            {tabs.map(tab => (
                                <button key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`px-5 py-3 rounded-xl font-semibold flex items-center gap-2 transition-all duration-300 shadow-lg
                                        ${activeTab === tab.id ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white transform -translate-y-1' : 'glass-panel text-gray-300 hover:text-white hover:bg-white/20'}`}>
                                    <i className={`fas ${tab.icon}`}></i>
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Content Area */}
                        <div className="transition-all duration-500">
                            {activeTab === 'flashcards' && <Flashcards />}
                            {activeTab === 'vocabQuiz' && <Quiz data={vocabQuizData} promptText="Quyidagi so'zning to'g'ri tarjimasini toping:" />}
                            {activeTab === 'dialogues' && <Dialogues />}
                            {activeTab === 'grammar' && <Grammar />}
                            {activeTab === 'grammarQuiz' && <Quiz data={grammarQuizData} promptText="Tegishli so'zni tanlang (Hanzi):" />}
                            {activeTab === 'fillBlanks' && <FillBlanks />}
                        </div>
                    </main>

                    <footer className="mt-auto glass-panel py-6 text-center text-gray-400 text-sm">
                        <p className="mb-1 text-indigo-200">HSK 3 NEW3.0 - Lesson 14</p>
                        <p>&copy; 2026 Dilfuza Kāng lǎo shī (<a href="https://t.me/diffila" className="text-blue-400 hover:underline">telegram@diffila</a>)</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
